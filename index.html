<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      //paredes
      <a-box position="0 0.1 0" rotation="0 0 0" depth="3" height="0.2" width="3" color="#9a9898"></a-box>
      <a-box position="0 1.7 -1.4" rotation="0 90 90" depth="3" height="0.2" width="3" color="#e9d8d9"></a-box>
      <a-box position="1.4 1.7 0" rotation="0 0 90" depth="3" height="0.2" width="3" color="#e4bebe"></a-box>
      //figuras
      <a-box position="-0.5 0.45 0.5" rotation="0 45 0" depth="0.5" height="0.5" width="0.5" color="#d41620"></a-box>
      <a-sphere position="0.5 0.7 0.75" radius="0.5" color="#3278c3"></a-sphere>
      <a-cylinder position="-0.2 1.2 -0.25" radius="0.25" height="2" color="#FFC65D"></a-cylinder>
      <a-cone position="0.7 0.8 -0.5" color="#7BC8A4" radius-bottom="0.5" radius-top="0" hight="1"></a-cone>
      <a-sky position="0 1 0" color="#ECECEC"></a-sky>
      < a-entity  light = "type: ambient; position="3 3 3" color: #FFFFFF" > </ a-entity > 
      <a-entity id="rig" position="-3 1 3">
  <a-entity id="camera" camera look-controls></a-entity>
</a-entity>
    </a-scene>
  </body>
</html>
